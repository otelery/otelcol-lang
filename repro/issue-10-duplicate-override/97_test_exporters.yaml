# "test" member (merged AFTER staging): re-defines file/sampled. Under confmap
# this is a legitimate override (last-wins), not a conflict.
#
#   main (no fix):  ERROR   duplicate exporter id "file/sampled" (both sites)
#                   ERROR   ambiguous reference "file/sampled" (in the pipeline)
#   fix (worktree): WARNING duplicate exporter id "file/sampled" overrides ...
#                   pipeline reference resolves normally (no error)
#
# To silence the override warning (worktree only), add the directive on the line
# directly above `file/sampled:` — see README.md.
exporters:
  file/sampled:
    path: ./output/otel-collector-sampled.json
    rotation: { max_megabytes: 50, max_backups: 5, max_days: 7 }
