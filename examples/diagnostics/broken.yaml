receivers:
  otlp:
    protocols:
      grpc:
  hostmetrics:
    collection_interval: 30s

processors:
  batch:
  transform:
    log_statements:
      - context: log
        statements:
          - set(body, "bear") where attributes["http.path"] == "/animal"

exporters:
  debug:
  bogus_exporter_type:
    endpoint: http://nowhere

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, transform]
      exporters: [does_not_exist]
    metrics:
      receivers: [hostmetrics]
      exporters: [debug]
    nonsense_signal:
      receivers: [otlp]
      exporters: [debug]
