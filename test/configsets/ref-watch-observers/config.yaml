extensions:
  k8s_observer:
    auth_type: serviceAccount
    node: ${env:K8S_NODE_NAME}
  docker_observer:
    endpoint: unix:///var/run/docker.sock

receivers:
  receiver_creator:
    watch_observers: [k8s_observer, docker_observer]
    receivers:
      otlp:
        rule: type == "pod"

exporters:
  debug:
    verbosity: detailed

service:
  extensions: [k8s_observer, docker_observer]
  pipelines:
    traces:
      receivers: [receiver_creator]
      exporters: [debug]
