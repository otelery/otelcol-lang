# Project-pinned toolchain. The Makefile reads versions from this file via
# the `mise_v` / `npm_v` helpers and creates per-tool sentinels in .ci-tools/<tool>-<ver>.
# Bump a version here; `make bootstrap` picks it up automatically.

[tools]
node = "26.3.0"
bun = "1.3.14"
rust = "1.96.0"
java = "temurin-17.0.19+10"
gradle = "9.5.1"
helix = "25.07.1"
tree-sitter = "0.26.9"

"npm:oxlint" = "1.69.0"
"npm:oxfmt" = "0.54.0"
"npm:@vscode/vsce" = "3.9.2"
"npm:typescript" = "6.0.3"
"npm:@vscode/test-cli" = "0.0.12"
osv-scanner = "2.3.8"
shellcheck = "0.11.0"

"cargo:cargo-outdated" = "0.19.0"
"cargo:cargo-edit" = "0.13.11"
